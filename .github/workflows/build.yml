name: Build and publish GeoServer image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - integration-tests/**
      - .github/workflows/build.yml
  pull_request:
    paths:
      - Dockerfile
      - integration-tests/**
      - .github/workflows/build.yml
  workflow_dispatch:
    inputs:
      build_n:
        description: "Build number suffix (default: 1; increment for same-day hotfix rebuilds)"
        required: false
        default: "1"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - geoserver_version: "2.28.3"
            latest: false
          - geoserver_version: "3.0.0"
            latest: true

    env:
      LOCAL_REF: geoserver-local:${{ matrix.geoserver_version }}
      IMAGE: ghcr.io/wps/geoserver

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build image
        run: |
          docker build \
            --build-arg GEOSERVER_VERSION=${{ matrix.geoserver_version }} \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t "${LOCAL_REF}" \
            .

      - name: Run integration tests
        run: |
          ./integration-tests/mvnw -f integration-tests/pom.xml verify \
            -Dgeoserver.image="${LOCAL_REF}" \
            -Dgeoserver.version="${{ matrix.geoserver_version }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.geoserver_version }}
          path: integration-tests/target/failsafe-reports/*.xml

      - name: Scan image for vulnerabilities (SARIF → Security tab)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_REF }}
          format: sarif
          output: trivy-${{ matrix.geoserver_version }}.sarif
          exit-code: "0"

      - name: Upload SARIF to GitHub Security
        if: always() && github.event_name != 'pull_request'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.geoserver_version }}.sarif
          category: trivy-${{ matrix.geoserver_version }}

      - name: Generate SBOM (CycloneDX)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_REF }}
          format: cyclonedx
          output: sbom-${{ matrix.geoserver_version }}.cdx.json
          exit-code: "0"

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-${{ matrix.geoserver_version }}
          path: |
            trivy-${{ matrix.geoserver_version }}.sarif
            sbom-${{ matrix.geoserver_version }}.cdx.json

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        if: github.event_name != 'pull_request'
        env:
          BUILD_N: ${{ github.event.inputs.build_n || '1' }}
        run: |
          FULL_TAG="${{ matrix.geoserver_version }}-$(date +%Y%m%d)-${BUILD_N}"
          docker tag "${LOCAL_REF}" "${IMAGE}:${{ matrix.geoserver_version }}"
          docker tag "${LOCAL_REF}" "${IMAGE}:${FULL_TAG}"
          docker push "${IMAGE}:${{ matrix.geoserver_version }}"
          docker push "${IMAGE}:${FULL_TAG}"
          if [[ "${{ matrix.latest }}" == "true" ]]; then
            docker tag "${LOCAL_REF}" "${IMAGE}:latest"
            docker push "${IMAGE}:latest"
          fi
