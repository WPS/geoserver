name: Bug report
description: Report a problem with the GeoServer base image
labels: ["bug"]
body:
  - type: input
    id: image_tag
    attributes:
      label: Image tag
      description: Which tag are you using?
      placeholder: "e.g. ghcr.io/wps/geoserver:3.0.0"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: CPU architecture of the host running the container
      placeholder: "linux/amd64 or linux/arm64"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include relevant log output or error messages
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. docker run ...
        2. ...
    validations:
      required: true
