name: New GeoServer version
description: Request adding a new GeoServer version to the CI matrix
labels: ["maintenance"]
body:
  - type: input
    id: version
    attributes:
      label: GeoServer version
      placeholder: "e.g. 3.1.0"
    validations:
      required: true

  - type: input
    id: release_url
    attributes:
      label: Release / changelog URL
      placeholder: "https://geoserver.org/announcements/..."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: The `-bin.zip` for this version is available on SourceForge
        - label: Reviewed `JAVA_OPTS` in the Dockerfile for javax/jakarta module flag changes (relevant for major version bumps)
